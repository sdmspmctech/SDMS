<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PMC Tech - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'fade-in-up': 'fadeInUp 0.8s ease-out',
                        'spin': 'spin 1s linear infinite',
                        'slide-in-right': 'slideInRight 0.5s ease-out',
                        'slide-out-right': 'slideOutRight 0.5s ease-out'
                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' }
                        },
                        slideInRight: {
                            '0%': { transform: 'translateX(100%)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        },
                        slideOutRight: {
                            '0%': { transform: 'translateX(0)', opacity: '1' },
                            '100%': { transform: 'translateX(100%)', opacity: '0' }
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-cover bg-center bg-no-repeat flex items-center justify-center p-4 md:p-5 relative" style="background-image: url('img/pmc1.webp');">
    <!-- Overlay for transparency -->
    <div class="absolute inset-0 bg-black bg-opacity-50 z-0"></div>
    
    <div class="w-full max-w-sm mx-auto relative z-10">
        <div class="bg-white/95 backdrop-blur-lg rounded-2xl md:rounded-3xl p-4 md:p-6 lg:p-7 shadow-2xl border border-white/30 text-center animate-fade-in-up">
            <div class="mb-4 md:mb-6">
                <img src="img/pmc.jpg" alt="PMC Tech Logo" class="w-24 md:w-32 lg:w-36 h-auto max-w-full rounded-lg mx-auto">
                <h1 class="mt-3 text-lg md:text-xl font-bold text-black">STUDENT DISCIPLINE MANAGEMENT SYSTEM</h1>
          
            </div>
            
            <div class="bg-gradient-to-br from-slate-700 to-slate-800 rounded-xl md:rounded-2xl p-4 md:p-6 shadow-lg">
                <h2 class="text-white text-xl md:text-2xl font-light mb-4 md:mb-6 tracking-wide"> Login</h2>
                
                <form id="loginForm" class="space-y-3 md:space-y-4">
                    <div class="relative">
                        <input type="email" id="email" placeholder="Enter email address" required 
                               class="w-full px-3 md:px-4 py-2.5 md:py-3 border-none rounded-lg text-sm md:text-base bg-white text-gray-800 outline-none transition-all duration-300 placeholder-gray-400 font-light focus:shadow-lg focus:shadow-blue-200/30 focus:-translate-y-0.5 focus:border-2 focus:border-blue-500 touch-manipulation">
                    </div>
                    
                    <div class="relative">
                        <input type="password" id="password" placeholder="Enter password" required 
                               class="w-full px-3 md:px-4 py-2.5 md:py-3 border-none rounded-lg text-sm md:text-base bg-white text-gray-800 outline-none transition-all duration-300 placeholder-gray-400 font-light focus:shadow-lg focus:shadow-blue-200/30 focus:-translate-y-0.5 focus:border-2 focus:border-blue-500 touch-manipulation pr-10 md:pr-12">
                        <i class="fas fa-eye absolute right-2.5 md:right-3 top-1/2 transform -translate-y-1/2 text-gray-600 cursor-pointer text-sm md:text-lg transition-colors duration-300 hover:text-slate-700 active:scale-95 touch-manipulation" id="togglePassword"></i>
                    </div>
                    
                    <button type="submit" class="w-full px-3 py-2.5 md:py-3 bg-gradient-to-r from-blue-500 to-blue-600 border-none rounded-lg text-white text-sm md:text-base font-semibold cursor-pointer transition-all duration-300 mt-3 md:mt-4 uppercase tracking-wide hover:-translate-y-0.5 hover:shadow-lg hover:shadow-blue-500/40 hover:from-blue-600 hover:to-blue-500 active:translate-y-0 active:scale-95 loading:opacity-70 loading:cursor-not-allowed touch-manipulation">
                        <i class="fas fa-sign-in-alt mr-2"></i>
                        Login 
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Footer -->
    <footer class="fixed bottom-0 left-0 right-0 py-1">
        <div class="max-w-6xl mx-auto px-4 md:px-5 ">
            <div class="text-center text-gray-900">
                <div class="mb-1">
                    <p class="text-xs md:text-sm font-medium text-gray-300">
                        © 2025 All Rights Reserved PMC TECH
                    </p>
                </div>
                <div>
                    <p class="text-xs opacity-80 flex items-center text-gray-300 justify-center gap-2">
                        Powered by 
                        <a href="https://zeonytechnologies.com" target="_blank" rel="noopener noreferrer" class="inline-block hover:opacity-100 transition-all duration-300 hover:scale-105">
                            <img src="img/zeony logo.png" alt="Zeony Technologies" class="h-14 w-30 ">
                        </a>
                    </p>
                </div>
            </div>
        </div>
    </footer>
    
    <script src="script.js"></script>
</body>
</html>
